<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .response.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .response.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 10px;
        }
        .info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 SMS API Test</h1>
        
        <div class="info">
            <strong>⚠️ Important:</strong> Replace the API URL and API Key below with your actual Supabase project details.
        </div>

        <form id="smsForm">
            <div class="form-group">
                <label for="apiUrl">API Endpoint URL</label>
                <input 
                    type="text" 
                    id="apiUrl" 
                    placeholder="https://YOUR_PROJECT.supabase.co/functions/v1/send-sms"
                    value="https://nsjaypfyaugzhrhoyfyf.supabase.co/functions/v1/send-sms"
                >
            </div>

            <div class="form-group">
                <label for="apiKey">API Key (from your panel)</label>
                <input 
                    type="text" 
                    id="apiKey" 
                    placeholder="Your API Key"
                >
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input 
                    type="tel" 
                    id="phoneNumber" 
                    placeholder="9812345678"
                    required
                >
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea 
                    id="message" 
                    rows="4" 
                    placeholder="Your message here..."
                    required
                ></textarea>
            </div>

            <button type="submit" id="sendBtn">Send SMS</button>
        </form>

        <div id="response" class="response"></div>
    </div>

    <script>
        const form = document.getElementById('smsForm');
        const responseDiv = document.getElementById('response');
        const sendBtn = document.getElementById('sendBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const message = document.getElementById('message').value;

            if (!apiKey) {
                showResponse('error', 'Please enter your API Key');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            responseDiv.style.display = 'none';

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey
                    },
                    body: JSON.stringify({
                        to: phoneNumber,
                        text: message
                    })
                });

                const data = await response.json();

                if (response.ok && !data.error) {
                    showResponse('success', 'SMS Sent Successfully!', data);
                } else {
                    showResponse('error', data.message || 'Failed to send SMS', data);
                }
            } catch (error) {
                showResponse('error', 'Network Error: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send SMS';
            }
        });

        function showResponse(type, message, data = null) {
            responseDiv.className = `response ${type}`;
            responseDiv.style.display = 'block';
            
            let html = `<strong>${message}</strong>`;
            
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            responseDiv.innerHTML = html;
        }
    </script>
</body>
</html>
